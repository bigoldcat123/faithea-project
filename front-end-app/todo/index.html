<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODO COMMAND CENTER</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="scan-line"></div>

    <div class="container">
        <header class="header">
            <div class="header-brand">
                <div class="status-indicator"></div>
                <h1 class="title">TODO<span class="blink">_</span></h1>
            </div>
            <div class="stats-bar">
                <div class="stat-item">
                    <span class="stat-label" data-text="PENDING">PENDING</span>
                    <span class="stat-value" id="pendingCount">0</span>
                </div>
                <div class="stat-divider">/</div>
                <div class="stat-item">
                    <span class="stat-label" data-text="COMPLETED">DONE</span>
                    <span class="stat-value" id="completedCount">0</span>
                </div>
            </div>
        </header>

        <div class="workspace">
            <section class="input-section">
                <div class="input-wrapper">
                    <input
                        type="text"
                        id="todoInput"
                        class="todo-input"
                        placeholder="Enter task directive..."
                        autocomplete="off"
                        maxlength="100"
                    >
                    <div class="input-border"></div>
                    <div class="input-corner tl"></div>
                    <div class="input-corner tr"></div>
                    <div class="input-corner bl"></div>
                    <div class="input-corner br"></div>
                </div>

                <div class="controls">
                    <div class="priority-selector">
                        <button class="priority-btn" data-priority="low" data-color="#00ff9f">
                            <span class="priority-indicator"></span>
                            LOW
                        </button>
                        <button class="priority-btn active" data-priority="medium" data-color="#ffbd00">
                            <span class="priority-indicator"></span>
                            MED
                        </button>
                        <button class="priority-btn" data-priority="high" data-color="#ff0055">
                            <span class="priority-indicator"></span>
                            HIGH
                        </button>
                    </div>
                    <button id="addBtn" class="add-btn">
                        <span class="add-icon">+</span>
                        <span class="add-text">EXECUTE</span>
                    </button>
                </div>
            </section>

            <section class="filter-section">
                <button class="filter-btn active" data-filter="all">ALL SYSTEMS</button>
                <button class="filter-btn" data-filter="active">ACTIVE</button>
                <button class="filter-btn" data-filter="completed">COMPLETED</button>
                <div class="filter-line"></div>
            </section>

            <section class="todo-list-section">
                <div class="list-header">
                    <div class="list-title">TASK_QUEUE</div>
                    <button id="clearCompleted" class="clear-btn">PURGE_COMPLETED</button>
                </div>
                <ul id="todoList" class="todo-list">
                    <!-- Todos will be rendered here -->
                </ul>
                <div id="emptyState" class="empty-state">
                    <div class="empty-icon">∅</div>
                    <div class="empty-text">NO TASKS IN QUEUE</div>
                    <div class="empty-sub">System idle. Awaiting directives.</div>
                </div>
            </section>
        </div>

        <footer class="footer">
            <div class="system-status">
                <span class="status-dot"></span>
                <span class="status-text">SYSTEM ONLINE</span>
            </div>
            <div class="timestamp" id="timestamp"></div>
        </footer>
    </div>

    <script type="module" src="./js/app.js"></script>
</body>
</html>
